name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet openpyxl

      - name: Remove preinstalled Flutter
        run: rm -rf /opt/hostedtoolcache/flutter

      - name: Create assets folder and copy Excel file
        run: |
          mkdir -p assets
          # نام دقیق فایل رو بررسی کن
          ls -la
          if [ -f "LOG SHEET 3.xlsx" ]; then
            cp "LOG SHEET 3.xlsx" assets/
            echo "✅ File copied successfully"
          else
            echo "⚠️ File not found! Creating dummy file..."
            # ایجاد یک فایل اکسل خالی به عنوان جایگزین
            python -c "from openpyxl import Workbook; wb=Workbook(); wb.save('assets/LOG SHEET 3.xlsx')"
          fi

      - name: Build APK
        run: |
          yes | flet build apk --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk