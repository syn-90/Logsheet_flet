name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Remove preinstalled Flutter
        run: rm -rf /opt/hostedtoolcache/flutter

      - name: Build APK
        run: yes | flet build apk --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk